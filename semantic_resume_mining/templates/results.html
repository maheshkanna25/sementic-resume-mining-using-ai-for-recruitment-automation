<!DOCTYPE html>
<html>
<head>
    <title>Results</title>
</head>
<body>

<h2>Screening Results</h2>

<table border="1">
    <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Location</th>
        <th>Status</th>
        <th>Score</th>
    </tr>

    {% for r in results %}
    <tr>
        <td>{{ r.name }}</td>
        <td>{{ r.email }}</td>
        <td>{{ r.phone }}</td>
        <td>{{ r.location }}</td>
        <td>{{ r.status }}</td>
        <td>{{ r.cosine }}%</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
